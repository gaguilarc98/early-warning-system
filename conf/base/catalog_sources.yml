# ARGUMENTS
_arg:
  country: ${runtime_params:country, ${globals:country}}
  peril: ${runtime_params:peril, 'rainfall'}
  provider: ${runtime_params:provider, ${globals:provider}}
  field: ${runtime_params:field, ${globals:field}}
  version: ${runtime_params:version, ${globals:version}}
  model: ${runtime_params:model, 'xgbc'}


# TARGET DATA
ds_aux_prcp:
  type: early_warning_system.datasets_registry.XarrayZarrDataset
  filepath: ${globals:data_path}/${_arg.country}/sources/UCSB_prcp.zarr
  save_args:
    consolidated: true
    mode: w
    chunks: {'lat': -1, 'lon': -1}
  load_args:
    consolidated: true

ds_aux_tmin:
  type: early_warning_system.datasets_registry.XarrayZarrDataset
  filepath: ${globals:data_path}/${_arg.country}/sources/CHIRTS_tmin.zarr
  save_args:
    consolidated: true
    mode: w
    chunks: {'lat': -1, 'lon': -1}
  load_args:
    consolidated: true

df_tmin:
  type: pandas.ParquetDataset
  filepath: ${globals:data_path}/${_arg.country}/inputs/SENAMHI_tmin.parquet

df_prcp:
  type: pandas.ParquetDataset
  filepath: ${globals:data_path}/${_arg.country}/inputs/SENAMHI_prcp.parquet

