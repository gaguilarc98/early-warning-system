# GEOMETRY DATA
gdf_aoi:
  type: geopandas.GenericDataset
  #filepath: ${globals:data_path}/${_arg.country}/geometries/location_geometries.parquet
  filepath: data/geometries/location_geometries.parquet
  file_format: parquet
  save_args:
    compression: GZIP

