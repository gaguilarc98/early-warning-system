# MASTER TABLE

df_mt_clean_predict: 
  type: pandas.ParquetDataset
  filepath: data/outputs/ews_${_arg.peril}_mt_clean.parquet
  save_args:
    compression: GZIP

df_update_preds:
  type: pandas.ParquetDataset
  filepath: data/outputs/ews_${_arg.peril}_update_predictions.parquet
  save_args:
    compression: GZIP

df_update_alerts:
  type: pandas.ParquetDataset
  filepath: data/outputs/ews_${_arg.peril}_update_alerts.parquet
  save_args:
    compression: GZIP

# POLYGONS HIERARCHY

gdf_hierarchy:
  type: geopandas.GenericDataset
  filepath: data/geometries/ews_polygons_hierarchy.parquet
  file_format: parquet
  save_args:
    compression: GZIP