# DYNAMIC FEATURES 
ds_f_fct_tmin:
  type: early_warning_system.datasets_registry.XarrayZarrDataset
  filepath: ${globals:data_path}/${_arg.country}/features/ews_f_fct_tmin.zarr
  save_args:
    consolidated: true
    mode: w
    chunks: {'time': 365, 'step':-1, 'lat': -1, 'lon': -1}
    align_chunks: True
  load_args:
    consolidated: true

